<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Automation Summary</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 2rem; }
    h1 { color: #2c3e50; }
    table { border-collapse: collapse; width: 100%; margin-top: 1.5rem; }
    th, td { border: 1px solid #ccc; padding: 0.5rem; text-align: left; }
    th { background: #f5f5f5; }
    .metrics { display: flex; gap: 2rem; margin-top: 1rem; }
    .metric { padding: 1rem; background: #eef2f5; border-radius: 6px; }
  </style>
</head>
<body>
  <h1>Daily Automation Summary</h1>
  <p>Generated: 2026-04-01 14:51:15Z</p>
  <div class="metrics">
    <div class="metric"><strong>Total Features</strong><br>1</div>
    <div class="metric"><strong>Total Scenarios</strong><br>1</div>
    <div class="metric"><strong>Passed</strong><br>0</div>
    <div class="metric"><strong>Failed</strong><br>0</div>
    <div class="metric"><strong>Skipped</strong><br>1</div>
  </div>
  <h2>Step Metrics</h2>
  <ul>
    <li>Passed: 1</li>
    <li>Failed: 0</li>
    <li>Skipped: 3</li>
  </ul>
  <h2>Failed Scenarios</h2>
  <table>
    <thead>
      <tr><th>Scenario</th><th>Feature</th><th>Status</th></tr>
    </thead>
    <tbody>
      <tr><td colspan="3">No failed scenarios</td></tr>
    </tbody>
  </table>
</body>
</html>
