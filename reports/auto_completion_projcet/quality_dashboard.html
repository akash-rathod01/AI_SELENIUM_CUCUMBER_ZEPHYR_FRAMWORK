<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Auto Completion Quality Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js" defer></script>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f6fb;
      --panel: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #e5e7eb;
      --accent: #2563eb;
      --accent-soft: rgba(37, 99, 235, 0.12);
      font-family: 'Inter', system-ui, sans-serif;
    }
    body {
      margin: 0;
      background: var(--bg);
      padding: 32px;
      color: var(--text);
    }
    h1 {
      margin-bottom: 4px;
      font-size: clamp(1.8rem, 2.5vw, 2.4rem);
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 24px;
    }
    .panel {
      background: var(--panel);
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 12px 24px rgba(15, 23, 42, 0.06);
      border: 1px solid var(--border);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }
    th, td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      text-align: left;
    }
    th {
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      font-size: 0.7rem;
      letter-spacing: 0.08em;
    }
    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .status-pill.passed { background: rgba(34,197,94,0.15); color: #047857; }
    .status-pill.failed { background: rgba(239,68,68,0.15); color: #dc2626; }
    .status-pill.skipped { background: rgba(234,179,8,0.2); color: #b45309; }
    .side-metrics {
      display: grid;
      gap: 12px;
      margin-top: 16px;
    }
    .metric-card {
      padding: 16px;
      background: var(--panel);
      border-radius: 12px;
      border: 1px solid var(--border);
    }
    .metric-card h3 {
      margin: 0 0 4px;
      font-size: 0.85rem;
      color: var(--muted);
    }
    .metric-card .value {
      font-size: 1.8rem;
      font-weight: 700;
    }
    .small-text {
      font-size: 0.8rem;
      color: var(--muted);
    }
    .chart-wrap {
      height: 240px;
      position: relative;
    }
    .two-col {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }
    .scroll-area {
      max-height: 240px;
      overflow-y: auto;
    }
  </style>
</head>

  <header style="margin-bottom:24px;">
    <h1>Auto Completion QA Dashboard</h1>
    <p class="small-text">Realtime quality view for https://dotesthere.com/. Updated <span id="generatedAt"></span>.</p>
  </header>
  <div class="grid">
    <section class="panel" style="grid-column: span 2;">
      <h2 style="margin-bottom:12px;">Critical Scenario Watchlist</h2>
      <div class="scroll-area">
        <table id="failedTable"></table>
      </div>
    </section>
    <aside style="display:flex; flex-direction:column; gap:16px;">
      <div class="panel">
        <h2 style="margin-bottom:12px;">Execution Snapshot</h2>
        <div class="side-metrics">
          <div class="metric-card">
            <h3>Total Scenarios</h3>
            <div class="value" id="metricTotal">0</div>
          </div>
          <div class="metric-card">
            <h3>Passed</h3>
            <div class="value" id="metricPassed">0</div>
          </div>
          <div class="metric-card">
            <h3>Failed</h3>
            <div class="value" id="metricFailed">0</div>
          </div>
          <div class="metric-card">
            <h3>Skipped</h3>
            <div class="value" id="metricSkipped">0</div>
          </div>
        </div>
      </div>
      <div class="panel">
        <h2 style="margin-bottom:12px;">Latest Run</h2>
        <p class="small-text" id="latestRun">No historical data</p>
      </div>
    </aside>
  </div>

  <div class="grid" style="margin-top:24px;">
    <section class="panel">
      <h2 style="margin-bottom:12px;">Status Distribution</h2>
      <div class="chart-wrap"><canvas id="statusChart"></canvas></div>
    </section>
    <section class="panel">
      <h2 style="margin-bottom:12px;">Feature Health</h2>

    </section>
    <section class="panel">

  </div>
